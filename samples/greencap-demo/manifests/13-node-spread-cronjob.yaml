apiVersion: batch/v1
kind: CronJob
metadata:
  name: node-spread-test
  namespace: greencap-demo
  labels:
    app.kubernetes.io/name: node-spread-test
    app.kubernetes.io/part-of: greencap-demo
    app.kubernetes.io/component: example-job
    app.kubernetes.io/managed-by: greencap
spec:
  schedule: "* * * * *"
  successfulJobsHistoryLimit: 10
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: node-spread-test
            app.kubernetes.io/part-of: greencap-demo
            app.kubernetes.io/component: example-job
        spec:
          containers:
            - name: hello
              image: busybox:1.36
              command: ["sh", "-c", "echo \"Hello from $(hostname) on node $NODE_NAME\" && sleep 5"]
              env:
                - name: NODE_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: spec.nodeName
              resources:
                requests:
                  cpu: "10m"
                  memory: "16Mi"
                limits:
                  cpu: "50m"
                  memory: "32Mi"
          restartPolicy: Never
